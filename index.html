<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yummy</title>
  
    <link rel="shortcut icon" href="images/logo.png" type="image/x-icon">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <div class="loading-screen position-fixed top-0 start-0 w-100 h-100 bg-black z-3">
        <span class="loader"></span>
    </div>

    
    <div class="side-nav position-fixed top-0 bottom-0 d-flex z-3">
        <div class="nav-links bg-black d-flex flex-column justify-content-between p-4 h-100">
            <ul class="list-unstyled mb-0 overflow-hidden">
                <li class="py-2 animate-link" onclick="showSearchInputs()"><a href="#" class="text-white text-decoration-none fs-5">Search</a></li>
                <li class="py-2 animate-link" onclick="getCategories()"><a href="#" class="text-white text-decoration-none fs-5">Categories</a></li>
                <li class="py-2 animate-link" onclick="getArea()"><a href="#" class="text-white text-decoration-none fs-5">Area</a></li>
                <li class="py-2 animate-link" onclick="getIngredients()"><a href="#" class="text-white text-decoration-none fs-5">Ingredients</a></li>
                <li class="py-2 animate-link" onclick="showContacts()"><a href="#" class="text-white text-decoration-none fs-5">Contact Us</a></li>
            </ul>
            <div class="nav-footer">
                <div class="icons d-flex mb-2">
                    <i class="fa-brands fa-facebook fs-6 me-2 cursor-pointer"></i>
                    <i class="fa-brands fa-twitter fs-6 me-2 cursor-pointer"></i>
                    <i class="fa-solid fa-globe fs-6 cursor-pointer"></i>
                </div>
                <p class="m-0" style="font-size: 13px;">Copyright © 2023 All Rights Reserved.</p>
            </div>
        </div>
        <div class="nav-header bg-white d-flex flex-column justify-content-between align-items-center py-4 px-2 h-100 text-black">
            <img src="images/logo.png" alt="logo" class="logo mb-4 cursor-pointer w-100" onclick="location.reload()">
            <i class="fa-solid fa-align-justify fa-2x cursor-pointer open-close-icon"></i>
            <div class="icons d-flex flex-column align-items-center">
                <i class="fa-solid fa-globe mb-2 cursor-pointer"></i>
                <i class="fa-solid fa-share-nodes cursor-pointer"></i>
            </div>
        </div>
    </div>

    
    <div class="container py-5" id="main-container">
        <div id="searchContainer"></div>
        <div class="row g-4" id="row-data">
           
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/main.js"></script>
</body>
</html>
